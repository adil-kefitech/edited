    <script>
        $(document).ready(function () {
    
    
            $("#dist").change(function () {
                console.log($("#dist")); // Add this line for debugging
                var token = '{{csrf_token}}';
                var dist_type = $("#dist").val()
                console.log("/////",dist_type)
               
                var url = "{% url 'ext-dist' %}?format=json";
                var res = $.ajax
                    ({
                        headers: { "X-CSRFToken": token },
                        type: "post",
                        url: url,
                        dataType: "json",
                        data: {
                            'dist_type': dist_type,
                        },
                        success: (res) => {
    
                            if (res.success == true) {
                                var data = res.data;
                                var collg_grps = data.collglist;
    
                                console.log(collg_grps)
                                $("#colg").empty();
                                $("#colg").append('<option value="" disabled selected></option>');
                                $.each(collg_grps, function (index, collg_grp) {
    
                                    console.log("ID:", collg_grp.id, "Name:", collg_grp.name);
                                    $("#colg").append(`<option value="${collg_grp.id}">${collg_grp.name}</option>`);
    
                                })
    
    
                            }
                        }
    
                    });
            });
        });
    </script>
    <script>
        $(document).ready(function () {


            $("#colg").change(function () {

                var token = '{{csrf_token}}';
                var college = $("#colg").val()
                console.log("/////", college)

                var url = "{% url 'ext-prgm' %}?format=json";
                var res = $.ajax
                    ({
                        headers: { "X-CSRFToken": token },
                        type: "post",
                        url: url,
                        dataType: "json",
                        data: {
                            'college': college,
                        },
                        success: (res) => {

                            if (res.success === true) {
                                var data = res.data;
                                var prg_lists = data.prglist;
                                var zonal_grps = data.userobj;
                                let text = "";
                                console.log("DDAATTAA : ",zonal_grps.length)
                                for (let i = 0; i < zonal_grps.length; i++) {
                                    console.log("NAME : ",zonal_grps[i].name)
                                    // $("#zoneid").empty();
                                    $("#zoneid").append('<option value="" disabled selected></option>');
                                    $("#zoneid").append(`<option value="${zonal_grps[i].id}">${zonal_grps[i].name}</option>`);
                                }
                                // console.log("LENGTH : ",text)
                                

                                $("#prg").empty();
                                $("#prg").append('<option value="" disabled selected></option>');

                                // Iterate through the array in steps of 2
                                for (var i = 0; i < prg_lists.length; i += 2) {
                                    var prg_id = prg_lists[i];
                                    var prg_name = prg_lists[i + 1];

                                   
                                    // Append options to the select element
                                    $("#prg").append(`<option value="${prg_id}">${prg_name}</option>`);
                                }

                            }
                        }

                    });
            });
        });
    </script>
     
     <script>
        $(document).ready(function () {
            console.log("11111114");
            $("#prg").change(function () {
                var url = "{% url 'ext-schm' %}?format=json";
                var token = "{{csrf_token}}";
                var programme_id = $("#prg").val();
                console.log("programme_id", programme_id);
    
                $("#sem").empty();
                $("#scheme").empty();
                $("#cors").empty();
    
                $.ajax({
                    url: url,
                    type: 'post',
                    data: {
                        "programme_id": programme_id,
                    },
                    headers: {
                        "X-CSRFToken": token
                    },
                    dataType: 'json',
                    success: function (res) {
                        var data = res.data;
                        var schemes = data.schemes;
                        var semesters = data.semesters;
    
                        $("#scheme").empty();
                        $("#scheme").append('<option value="" disabled selected></option>');
                        $.map(schemes, function (scheme) {
                            $("#scheme").append('<option value=' + scheme.id + '>' + scheme.name + '</option>');
                        });
    
                        $("#sem").empty();
                        $("#sem").append('<option value="" disabled selected></option>');
                        $.map(semesters, function (semester) {
                            $("#sem").append('<option value=' + semester.semId + '>' + semester.semTitle + '</option>');
                        });
                    }
                });
            });
        });
    </script>
    <script>
        //sem wise course list
        $("#sem").change(function (e) {
            e.preventDefault(); 
            $("#course").empty()
            // $("#submit_button").prop('disabled', true);
            var prgmname = $("#prg option:selected").val();
            var semesternumber=$("#sem option:selected").val();
            var acadamicyear=$("#adm_year option:selected").val();
            var token = "{{csrf_token}}";
            var url = "{% url 'ext-cors' %}?format=json";
            console.log("acadamicyear",acadamicyear)
            var res = jQuery.ajax
                ({
                    type: "post",
                    url: url,
                    headers: {
                        "X-CSRFToken": token
                    },
                    dataType: "json",

                    data: {
                        "programme_id": prgmname,
                        'sem_id':semesternumber,
                        "acadamicyear":acadamicyear
    
                    },
                    success: renderlist
                });
            function renderlist(res) {
                // $("#maxmimum").empty()
                // document.getElementById("maxmimum").value=res.data.course[0].maximumMark  
               
                var course_code_len = res.data.course.length
                $("#cors").append('<option value="" disabled selected></option>')
                for (var i = 0; i < course_code_len; ++i) {
                    $("#cors").append('<option  value="' + res.data.course[i].courseId + '">' + res.data.course[i].courseName + '</option>')
                       
    
                  
                    
                }
            }
        });
        $("#course").change(function (e) {
            e.preventDefault(); 
            $("#submit_button").prop('disabled', false);         
        })
    </script>
    <script>
        $("#submit").click(function () {
            var search_id = $("#search").val();
            var token = '{{ csrf_token }}';
            var url = "{% url 'ext-tchr' %}?format=json";
    
            $.ajax({
                headers: { "X-CSRFToken": token },
                type: "post",
                url: url,
                dataType: "json",
                data: {
                    'search_id': search_id,
                },
    
                success: (res) => {
                    console.log(res)
                    if (res.success == true) {
                        
                        $("#name").text(res.data.fullname);
                        console.log(res.data.fullname)
                        $("#col-id").text(res.data.collobj);
                      
                        
                        $("#mail-id").text(res.data.mailId);
                        
    
    
                    }
                }
            });
        });
    </script>
    <script>
        $("#reset").click(function (){
            location.reload();
        })
    </script>
    
    
<script>
    $("#allo").click(function () {
        var coll_id = $("#colg").val();
        var sem_id = $("#sem").val();
        var prg_id = $("#prg").val();
        var cors_id = $("#cors").val();
        var admid = $("#admid").val();
        var search_id = $("#search").val();
        var zoneid = $("#zoneid").val();

        // Ask for confirmation before proceeding
        var token = '{{ csrf_token }}';

        fetch("{% url 'ext-allocation' %}", {
            method: 'post',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json',
                'X-CSRFToken': token
            },
            body: JSON.stringify({
                'coll_id': coll_id,
                'sem_id': sem_id,
                'prg_id': prg_id,
                'cors_id': cors_id,
                'admid': admid,
                'search_id': search_id,
                'zoneid': zoneid


            })
        }).then(function (res) { return res.json(); })
            .then(function (data) {
                unblockUI();
                if (data.success == true) {
                    swal.fire({
                        title: 'Done!',
                        text: data.message,
                        type: 'success',
                        padding: '2em',
                    }).then(() => {
                        location.reload();
                    });
                    //   location.reload();                        
                }
                else {
                    Swal({
                        "title": "Oops!",
                        type: 'error',
                        "text": data.message,
                        padding: '2em'
                    })


                }
            });
    });
</script>
{% endblock %}
